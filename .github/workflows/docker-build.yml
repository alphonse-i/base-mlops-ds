name: Build and Push MLOps Docker Image

# Le workflow se déclenche uniquement si on push sur "main"
# ET que les fichiers dans le nouveau dossier "ml_pipeline" ont été modifiés.
on:
  push:
    branches: [ "main" ]
    paths:
      - 'ml/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Récupération du code (Checkout)
        uses: actions/checkout@v3

      - name: Connexion au registre Docker (Docker Hub ou Registre Privé)
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build et Push de l'image
        uses: docker/build-push-action@v4
        with:
          context: ./ml
          push: true
          # NOUVEAU : Nom de l'image plus générique (agnostique au modèle)
          tags: ${{ secrets.DOCKER_USERNAME }}/helmet-detection-model:${{ github.sha }}

      # --- ÉTAPE GITOPS ---
      # Faire communiquer l'IC github(internet) avec Airflow(local)
      - name: Mise à jour du tag pour Airflow
        run: |
          # 1. On écrit le nom complet de la nouvelle image dans le fichier texte
          echo "${{ secrets.DOCKER_USERNAME }}/mlops-framework:${{ github.sha }}" > dags/scripts/image_version.txt
          
          # 2. On configure le robot Git
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          # 3. On valide et on pousse le changement sur le dépôt
          git add dags/scripts/image_version.txt
          git commit -m "🤖 Mise à jour automatique de l'image Docker vers le commit ${{ github.sha }}"
          git push